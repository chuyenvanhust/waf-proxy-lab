# ── OWASP CRS Setup ─────────────────────────────────────
# Copy từ crs-setup.conf.example, chỉnh các giá trị quan trọng

# Paranoia level: 1 (lỏng) → 4 (chặt nhất)
# Level 1: phù hợp production, ít false positive
# Level 2: dùng trong lab để kiểm thử kỹ hơn
SecAction \
  "id:900000,\
  phase:1,\
  pass,\
  t:none,\
  nolog,\
  tag:'OWASP_CRS',\
  setvar:tx.paranoia_level=1"

# ── Anomaly Scoring Threshold ────────────────────────────
# Inbound: tổng điểm request vượt ngưỡng → block
# 5 = mặc định | 3 = chặt hơn | 10 = lỏng hơn
SecAction \
  "id:900110,\
  phase:1,\
  pass,\
  t:none,\
  nolog,\
  tag:'OWASP_CRS',\
  setvar:tx.inbound_anomaly_score_threshold=5,\
  setvar:tx.outbound_anomaly_score_threshold=4"

# ── HTTP Policy ──────────────────────────────────────────
SecAction \
  "id:900200,\
  phase:1,\
  pass,\
  t:none,\
  nolog,\
  tag:'OWASP_CRS',\
  setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# ── Max request sizes ────────────────────────────────────
SecAction \
  "id:900300,\
  phase:1,\
  pass,\
  t:none,\
  nolog,\
  tag:'OWASP_CRS',\
  setvar:tx.max_num_args=255,\
  setvar:tx.arg_name_length=100,\
  setvar:tx.arg_length=400,\
  setvar:tx.total_arg_length=64000,\
  setvar:tx.max_file_size=1048576,\
  setvar:tx.combined_file_sizes=1048576"
