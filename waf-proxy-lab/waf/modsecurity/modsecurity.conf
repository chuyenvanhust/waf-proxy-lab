# ── ModSecurity Engine ──────────────────────────────────
# On = block mode | DetectionOnly = chỉ log, không block
SecRuleEngine On

# ── Request Body ────────────────────────────────────────
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# ── Response Body ───────────────────────────────────────
SecResponseBodyAccess On
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# ── Audit Log ───────────────────────────────────────────
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec/audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABIJDEFHZ
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# ── Debug (tắt khi production, bật khi debug) ───────────
SecDebugLog /var/log/modsec/debug.log
SecDebugLogLevel 0

# ── Data directory ──────────────────────────────────────
SecTmpDir /tmp/modsecurity
SecDataDir /tmp/modsecurity

# ── Upload ──────────────────────────────────────────────
SecUploadDir /tmp/modsecurity
SecUploadKeepFiles Off

# ── Include CRS ─────────────────────────────────────────
Include /etc/nginx/modsecurity-crs/crs-setup.conf
Include /etc/nginx/modsecurity-crs/rules/*.conf
Include /etc/nginx/modsecurity-crs/rules/custom-rules.conf
