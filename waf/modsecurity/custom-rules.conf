# ── Custom WAF Rules ─────────────────────────────────────
# Các rule bổ sung ngoài OWASP CRS mặc định
# ID range: 9001-9099 (không trùng với CRS)

# ── Block sqlmap User-Agent ──────────────────────────────
SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" \
  "id:9001,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'sqlmap detected in User-Agent',\
  tag:'attack-tool'"

# ── Block XSStrike User-Agent ────────────────────────────
SecRule REQUEST_HEADERS:User-Agent "@contains XSStrike" \
  "id:9002,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'XSStrike scanner detected',\
  tag:'attack-tool'"

# ── Block SVG XSS (bypass CRS mặc định) ─────────────────
SecRule ARGS "@rx (?i)<svg[^>]*\bon" \
  "id:9010,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'SVG XSS attempt',\
  tag:'attack-xss'"

# ── Block null byte injection ────────────────────────────
SecRule ARGS "@contains %00" \
  "id:9020,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Null byte injection attempt',\
  tag:'attack-injection'"

# ── Block access to sensitive files ─────────────────────
SecRule REQUEST_URI "@rx (?i)\.(git|env|htpasswd|ssh|bak|sql)$" \
  "id:9030,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'Sensitive file access attempt',\
  tag:'attack-lfi'"
