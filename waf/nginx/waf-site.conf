server {
    listen 80;
    server_name _;

    # ── Bật ModSecurity ────────────────────────────────
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity/modsecurity.conf;

    # ── Bảo mật header ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Rate limiting login ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    location /login.php {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend:80;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # ── Reverse proxy đến backend ──────────────────────
    location / {
        proxy_pass http://backend:80;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # ── Custom error page khi bị block ─────────────────
    error_page 403 /403.html;
    location = /403.html {
        default_type text/html;
        return 403 '<!DOCTYPE html>
<html><head><title>403 Blocked</title></head>
<body><h1>Request Blocked by WAF</h1>
<p>Your request was identified as potentially malicious.</p>
</body></html>';
    }
}
